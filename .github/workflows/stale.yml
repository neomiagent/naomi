name: stale
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "this issue has been quiet for 60 days. closing in 14 unless there is activity."
          stale-pr-message: "this pr has been quiet for 60 days. closing in 14 unless there is activity."
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
